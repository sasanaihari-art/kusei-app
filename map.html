<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a237e">
  <title>地図・方位確認</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    #map { width: 100%; height: calc(100vh - 130px); }
    .map-date-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; background: #fff; border-bottom: 1px solid #e0e0e0;
      font-size: 13px;
    }
    .map-date-row input { font-size: 14px; padding: 4px 8px; border: 1px solid #e0e0e0; border-radius: 6px; }
    .map-info-panel { position: fixed; bottom: 70px; left: 8px; right: 8px;
      background: rgba(255,255,255,0.96); border-radius: 12px; padding: 12px 16px;
      z-index: 1000; box-shadow: 0 2px 12px rgba(0,0,0,0.25); display: none; }
    .map-info-panel.visible { display: block; }
    .dir-result { font-size: 20px; font-weight: 700; }
    .dir-result.safe { color: #2e7d32; }
    .dir-result.danger { color: #c62828; }
    .dir-warnings { margin-top: 4px; font-size: 13px; }
    .dir-angle { font-size: 11px; color: #757575; margin-top: 2px; }
    .legend { position: fixed; top: 52px; right: 8px; background: rgba(255,255,255,0.92);
      border-radius: 8px; padding: 6px 10px; font-size: 10px; z-index: 1000;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .legend-item { display: flex; align-items: center; gap: 4px; margin: 2px 0; }
    .legend-color { width: 12px; height: 12px; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>地図・方位確認</h1>
    <span id="header-date" class="header-date"></span>
  </div>

  <div class="map-date-row">
    <label>日付:</label>
    <input type="date" id="map-date">
    <button class="btn btn-primary" id="btn-map-today" style="padding:4px 10px;font-size:12px;">今日</button>
  </div>

  <div id="map"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-color" style="background:#c62828"></div>五黄殺</div>
    <div class="legend-item"><div class="legend-color" style="background:#4a148c"></div>暗剣殺</div>
    <div class="legend-item"><div class="legend-color" style="background:#e65100"></div>歳破/月破</div>
    <div class="legend-item"><div class="legend-color" style="background:#B8860B"></div>🌟 本当の吉</div>
    <div class="legend-item"><div class="legend-color" style="background:#2e7d32"></div>✅ 吉(本命)</div>
    <div class="legend-item"><div class="legend-color" style="background:#558B2F"></div>○ まずまず</div>
    <div class="legend-item"><div class="legend-color" style="background:rgba(76,175,80,0.15);border:1px solid #4CAF50"></div>安全</div>
  </div>

  <div id="info-panel" class="map-info-panel">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div id="panel-dir" class="dir-result"></div>
        <div id="panel-warnings" class="dir-warnings"></div>
        <div id="panel-angle" class="dir-angle"></div>
      </div>
      <button id="btn-register" class="btn btn-primary" style="font-size:12px;padding:6px 12px;white-space:nowrap;margin-left:8px;">★ 登録</button>
    </div>
  </div>

  <!-- 場所登録モーダル -->
  <div id="register-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:20px;width:90%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.3);">
      <h2 style="font-size:16px;margin-bottom:12px;">この場所を登録</h2>
      <div id="register-preview" style="font-size:13px;color:#757575;margin-bottom:12px;"></div>
      <div class="form-group">
        <label style="display:block;font-size:12px;color:#757575;margin-bottom:4px;">場所の名前</label>
        <input type="text" id="register-name" placeholder="例: 大阪（往診先）" style="width:100%;padding:10px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:15px;">
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-primary" id="btn-register-save" style="flex:2;">保存</button>
        <button class="btn" id="btn-register-cancel" style="flex:1;background:#e0e0e0;">閉じる</button>
      </div>
    </div>
  </div>

  <nav class="nav">
    <a href="index.html"><span class="nav-icon">&#x2609;</span><span>方位盤</span></a>
    <a href="map.html" class="active"><span class="nav-icon">&#x1F5FA;</span><span>地図</span></a>
    <a href="places.html"><span class="nav-icon">&#x2605;</span><span>場所</span></a>
    <a href="settings.html"><span class="nav-icon">&#x2699;</span><span>設定</span></a>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/kusei-engine.js"></script>
  <script src="js/family.js"></script>
  <script src="js/places.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const home = PlacesManager.getHome();
      let currentDate = new Date();
      const dateInput = document.getElementById('map-date');
      dateInput.value = formatDate(currentDate);

      dateInput.addEventListener('change', () => {
        currentDate = new Date(dateInput.value + 'T00:00:00');
        updateOverlays();
        document.getElementById('header-date').textContent =
          `${currentDate.getFullYear()}年${currentDate.getMonth()+1}月${currentDate.getDate()}日`;
      });
      document.getElementById('btn-map-today').addEventListener('click', () => {
        currentDate = new Date();
        dateInput.value = formatDate(currentDate);
        updateOverlays();
      });

      document.getElementById('header-date').textContent =
        `${currentDate.getFullYear()}年${currentDate.getMonth()+1}月${currentDate.getDate()}日`;

      // Map init
      const map = L.map('map').setView([home.lat, home.lng], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);

      // Home marker
      L.marker([home.lat, home.lng], {
        icon: L.divIcon({ className: '', html: '<div style="background:#1a237e;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.3);">家</div>', iconSize: [28, 28], iconAnchor: [14, 14] })
      }).addTo(map);

      // Direction overlays
      let directionLayers = L.layerGroup().addTo(map);
      let clickMarker = null;

      function updateOverlays() {
        directionLayers.clearLayers();
        const dayInfo = KuseiEngine.getDayInfo(currentDate);
        const radius = 200000; // 200km

        const dirs = ['N','NE','E','SE','S','SW','W','NW'];
        const angles = KuseiEngine.DIR_ANGLES;

        const member = FamilyManager.getActiveMember();
        for (const dir of dirs) {
          const a = angles[dir];
          // 日盤ベースで表示
          const dayWarnings = [];
          if (dayInfo.day.goousatsu === dir) dayWarnings.push('日五黄殺');
          if (dayInfo.day.ankensatsu === dir) dayWarnings.push('日暗剣殺');
          // 年・月の凶もサブ表示
          if (dayInfo.year.goousatsu === dir) dayWarnings.push('年五黄殺');
          if (dayInfo.year.ankensatsu === dir) dayWarnings.push('年暗剣殺');
          if (dayInfo.month.goousatsu === dir) dayWarnings.push('月五黄殺');
          if (dayInfo.month.ankensatsu === dir) dayWarnings.push('月暗剣殺');

          // 吉方位判定
          const luck = KuseiEngine.getDirectionLuck(dir, dayInfo, member.honmei, member.getsu);

          let color = 'rgba(76,175,80,0.12)';
          let borderColor = '#4CAF50';
          if (dayWarnings.some(w => w.includes('五黄殺'))) { color = 'rgba(198,40,40,0.18)'; borderColor = '#c62828'; }
          else if (dayWarnings.some(w => w.includes('暗剣殺'))) { color = 'rgba(74,20,140,0.18)'; borderColor = '#4a148c'; }
          else if (dayWarnings.some(w => w.includes('破'))) { color = 'rgba(230,81,0,0.15)'; borderColor = '#e65100'; }
          else if (luck.level === 'best') { color = 'rgba(255,215,0,0.2)'; borderColor = '#B8860B'; }
          else if (luck.level === 'good') { color = 'rgba(46,125,50,0.15)'; borderColor = '#2e7d32'; }
          else if (luck.level === 'fair') { color = 'rgba(85,139,47,0.12)'; borderColor = '#558B2F'; }

          // Draw sector
          const points = [L.latLng(home.lat, home.lng)];
          let startAngle = a.start;
          let endAngle = a.end;
          if (startAngle > endAngle) endAngle += 360;

          for (let angle = startAngle; angle <= endAngle; angle += 2) {
            const a2 = angle % 360;
            const rad = (90 - a2) * Math.PI / 180;
            const dlat = (radius / 111320) * Math.cos(rad);
            const dlng = (radius / (111320 * Math.cos(home.lat * Math.PI / 180))) * Math.sin(rad);
            points.push(L.latLng(home.lat + dlat, home.lng + dlng));
          }
          points.push(L.latLng(home.lat, home.lng));

          L.polygon(points, {
            color: borderColor, weight: 1, fillColor: color, fillOpacity: 0.6, opacity: 0.6
          }).addTo(directionLayers);

          // Direction label
          const midAngle = ((a.start + (a.end < a.start ? a.end + 360 : a.end)) / 2) % 360;
          const labelRad = (90 - midAngle) * Math.PI / 180;
          const labelDist = radius * 0.4;
          const labelLat = home.lat + (labelDist / 111320) * Math.cos(labelRad);
          const labelLng = home.lng + (labelDist / (111320 * Math.cos(home.lat * Math.PI / 180))) * Math.sin(labelRad);

          const dirIdx = KuseiEngine.DIR_KEYS.indexOf(dir);
          const dirName = KuseiEngine.DIRECTIONS[dirIdx];
          const warnText = dayWarnings.length > 0 ? `<br><b style="color:${borderColor}">${dayWarnings[0]}</b>` : '';

          L.marker([labelLat, labelLng], {
            icon: L.divIcon({
              className: '',
              html: `<div style="text-align:center;font-size:11px;font-weight:600;color:#333;text-shadow:0 0 3px #fff,0 0 3px #fff;">${dirName}${warnText}</div>`,
              iconSize: [60, 30], iconAnchor: [30, 15]
            })
          }).addTo(directionLayers);
        }

        // Registered places markers with luck info
        const places = PlacesManager.getPlaces();
        for (const place of places) {
          const { dirKey, dirName } = PlacesManager.getPlaceDirection(place);
          const luck = KuseiEngine.getDirectionLuck(dirKey, dayInfo, member.honmei, member.getsu);
          let color = '#757575'; let emoji = '';
          if (luck.level === 'bad') { color = '#c62828'; emoji = '⛔'; }
          else if (luck.level === 'best') { color = '#B8860B'; emoji = '🌟'; }
          else if (luck.level === 'good') { color = '#2e7d32'; emoji = '✅'; }
          else if (luck.level === 'fair') { color = '#558B2F'; emoji = '○'; }
          L.marker([place.lat, place.lng], {
            icon: L.divIcon({
              className: '',
              html: `<div style="background:${color};color:#fff;border-radius:6px;padding:2px 6px;font-size:11px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.3);">${emoji} ${place.name}</div>`,
              iconSize: [100, 20], iconAnchor: [50, 10]
            })
          }).addTo(directionLayers);
        }
      }

      // Click handler
      let clickedLat = null, clickedLng = null, clickedDirName = '';
      map.on('click', (e) => {
        const { lat, lng } = e.latlng;
        clickedLat = lat;
        clickedLng = lng;
        const bearing = KuseiEngine.calcBearing(home.lat, home.lng, lat, lng);
        const dirKey = KuseiEngine.angleToDirKey(bearing);
        const dirIdx = KuseiEngine.DIR_KEYS.indexOf(dirKey);
        const dirName = KuseiEngine.DIRECTIONS[dirIdx];
        clickedDirName = dirName;

        const dayInfo = KuseiEngine.getDayInfo(currentDate);
        const member = FamilyManager.getActiveMember();
        const luck = KuseiEngine.getDirectionLuck(dirKey, dayInfo, member.honmei, member.getsu);

        if (clickMarker) map.removeLayer(clickMarker);
        const markerColor = luck.level === 'best' ? '#FFD700' : luck.level === 'good' ? '#4CAF50' : luck.level === 'fair' ? '#81C784' : luck.level === 'bad' ? '#c62828' : '#2196F3';
        clickMarker = L.marker([lat, lng], {
          icon: L.divIcon({
            className: '',
            html: `<div style="background:${markerColor};width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>`,
            iconSize: [16, 16], iconAnchor: [8, 8]
          })
        }).addTo(map);

        const panel = document.getElementById('info-panel');
        const panelDir = document.getElementById('panel-dir');
        const panelWarnings = document.getElementById('panel-warnings');
        const panelAngle = document.getElementById('panel-angle');

        const starInDir = luck.starInDir;
        const starName = KuseiEngine.STAR_SHORT[starInDir];

        if (luck.level === 'bad') {
          panelDir.textContent = `${dirName}方位 【${starName}】`;
          panelDir.className = 'dir-result danger';
          panelWarnings.innerHTML = luck.warnings.map(w => `<span style="color:#c62828;font-weight:600;">⛔ ${w}</span>`).join('・');
        } else if (luck.level === 'best') {
          panelDir.textContent = `${dirName}方位 【${starName}】`;
          panelDir.className = 'dir-result';
          panelDir.style.color = '#B8860B';
          panelWarnings.innerHTML = '<span style="color:#B8860B;font-weight:700;">🌟 本当の吉方位（本命・月命ともに吉）</span>';
        } else if (luck.level === 'good') {
          panelDir.textContent = `${dirName}方位 【${starName}】`;
          panelDir.className = 'dir-result safe';
          panelWarnings.innerHTML = '<span style="color:#2e7d32;font-weight:600;">✅ 吉方位（本命吉）</span>';
        } else if (luck.level === 'fair') {
          panelDir.textContent = `${dirName}方位 【${starName}】`;
          panelDir.className = 'dir-result safe';
          panelWarnings.innerHTML = '<span style="color:#558B2F;font-weight:600;">○ まずまずの吉方位（月命吉）</span>';
        } else {
          panelDir.textContent = `${dirName}方位 【${starName}】`;
          panelDir.className = 'dir-result';
          panelDir.style.color = '#757575';
          panelWarnings.innerHTML = '<span style="color:#757575;">ー 吉でも凶でもない</span>';
        }

        panelAngle.textContent = `方位角: ${bearing.toFixed(1)}°  (${lat.toFixed(4)}, ${lng.toFixed(4)}) — ${member.name}`;
        panel.classList.add('visible');
      });

      // 場所登録
      const registerModal = document.getElementById('register-modal');
      document.getElementById('btn-register').addEventListener('click', (e) => {
        e.stopPropagation();
        if (clickedLat === null) return;
        document.getElementById('register-preview').textContent =
          `${clickedDirName}方位（${clickedLat.toFixed(4)}, ${clickedLng.toFixed(4)}）`;
        document.getElementById('register-name').value = '';
        registerModal.style.display = 'flex';
        setTimeout(() => document.getElementById('register-name').focus(), 100);
      });
      document.getElementById('btn-register-cancel').addEventListener('click', () => {
        registerModal.style.display = 'none';
      });
      document.getElementById('btn-register-save').addEventListener('click', () => {
        const name = document.getElementById('register-name').value.trim();
        if (!name) { alert('名前を入力してください'); return; }
        PlacesManager.addPlace({ name, lat: clickedLat, lng: clickedLng, address: '' });
        registerModal.style.display = 'none';
        updateOverlays(); // マーカーを更新
      });

      updateOverlays();

      function formatDate(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      }
    });
  </script>
</body>
</html>
